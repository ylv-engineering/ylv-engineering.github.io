<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>隐律实验室</title>
        <link rel="stylesheet" href="style.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <input type="checkbox" class="menu-check" id="menu-opener" />

        <header class="site-header">
            <a href="/" class="logo">
                <img src="Logo/logo.drawio.png" alt="ylv" />
                <span class="logo-text">｜隐律实验室</span>
            </a>
            <div class="header-actions">
                <a href="en.html" class="lang-switch">EN</a>
                <label for="menu-opener" class="menu-btn">选单</label>
            </div>
        </header>

        <div class="global-menu">
            <div class="menu-header">
                <span class="menu-logo">隐律实验室</span>
                <label for="menu-opener" class="menu-close">关闭</label>
            </div>
            <div class="menu-body">
                <h2>选单</h2>
                <ul class="menu-list">
                    <li><a href="#products">解决方案</a></li>
                    <li><a href="#knowledge">知识库</a></li>
                    <li><a href="#software">软件</a></li>
                    <li><a href="#about">关于</a></li>
                </ul>
            </div>
        </div>

        <main>
            <section class="fv">
                <h1 class="fv-copy">
                    <span class="fv-line1"> 洞见 </span>
                    <span class="fv-line2">隐律.</span>
                </h1>
                <div class="fv-desc">隐于核心，律动万物.</div>
            </section>

            <section class="business" id="products">
                <div class="business-grid">
                    <a href="#" class="business-item">
                        <svg
                            class="i-arrow"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                        >
                            <path d="M7 17L17 7M17 7H7M17 7V17" />
                        </svg>
                        <span>解决方案</span>
                    </a>
                    <a href="#" class="business-item">
                        <svg
                            class="i-arrow"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                        >
                            <path d="M7 17L17 7M17 7H7M17 7V17" />
                        </svg>
                        <span>知识库</span>
                    </a>
                    <a href="#" class="business-item">
                        <svg
                            class="i-arrow"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                        >
                            <path d="M7 17L17 7M17 7H7M17 7V17" />
                        </svg>
                        <span>软件</span>
                    </a>
                    <a href="#about" class="business-item">
                        <svg
                            class="i-arrow"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                        >
                            <path d="M7 17L17 7M17 7H7M17 7V17" />
                        </svg>
                        <span>关于</span>
                    </a>
                </div>
            </section>

            <section class="cta" id="contact">
                <div class="cta-inner">
                    <h2>联系我们</h2>
                    <a href="mailto:hello@ylv.audio" class="cta-link">
                        <svg
                            class="i-arrow"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                        >
                            <path d="M7 17L17 7M17 7H7M17 7V17" />
                        </svg>
                        hello@ylv.audio
                    </a>
                </div>
            </section>
        </main>

        <footer class="site-footer" id="about">
            <a
                href="#"
                class="return-top"
                onclick="
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    return false;
                "
            >
                <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                >
                    <path d="M18 15L12 9L6 15" />
                </svg>
            </a>
            <div class="copyright">&copy; 2026 ylv audio technology</div>
        </footer>

</html>
